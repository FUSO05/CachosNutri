<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <script>
  (function() {
    try {
      var saved = localStorage.getItem('cachos_theme');
      var theme = saved || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    } catch (e) {}
  })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CachosNutri - Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="icon" type="image/png" href="img/fav.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.3" integrity="sha384-uVefCux0Kf6w34gQVv8+jUPUwvwFUdnrcwI1kOJHs7sfPPXdDDucwcrPrppD6oUe" crossorigin="anonymous"></script>
</head>
<body>

<!-- ══ LOGIN DE ADMIN ══ -->
<div id="pg-admin-auth" class="pg-auth">
  <div class="auth-right">
    <div class="auth-box">
      <div class="auth-logo">
        <img src="img/fav.png" alt="CachosNutri" class="auth-logo-img">
        <span class="auth-logo-text">CachosNutri</span>
      </div>
      <p class="auth-tagline">Administração</p>
      <form class="auth-form" id="admin-login-form" onsubmit="event.preventDefault(); handleAdminLogin();">
        <div class="form-field"><label class="field-label">E-mail</label><input class="field-input" type="email" id="admin-login-email" autocomplete="username" required></div>
        <div class="form-field"><label class="field-label">Password</label><input class="field-input" type="password" id="admin-login-password" autocomplete="current-password" required></div>
        <div class="auth-error" id="admin-login-error"></div>
        <button class="btn-primary auth-submit" type="submit" id="admin-login-btn">Entrar</button>
      </form>
    </div>
  </div>
</div>

<!-- ══ DASHBOARD DE ADMIN ══ -->
<div id="pg-admin-shell" class="admin-shell" style="display:none">
  <div class="admin-topbar">
    <div class="admin-topbar-brand">
      <img src="img/fav.png" alt="CachosNutri" class="auth-logo-img" style="width:24px;height:24px">
      <span>CachosNutri · Admin</span>
    </div>
    <button class="btn-back" onclick="handleAdminLogout()">Terminar sessão</button>
  </div>

  <div class="admin-content">
    <div class="admin-filter-tabs" id="admin-filter-tabs">
      <button class="admin-filter-tab active" data-status="pending" onclick="setAdminFilter('pending')">Pendentes</button>
      <button class="admin-filter-tab" data-status="approved" onclick="setAdminFilter('approved')">Aprovados</button>
      <button class="admin-filter-tab" data-status="rejected" onclick="setAdminFilter('rejected')">Rejeitados</button>
      <button class="admin-filter-tab" data-status="all" onclick="setAdminFilter('all')">Todos</button>
    </div>

    <div id="admin-list" class="admin-list"></div>
  </div>
</div>

<!-- REJECT REASON MODAL -->
<div id="adminRejectModal" class="modal-overlay" onclick="if(event.target===this)closeAdminRejectModal()" style="display:none">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">Rejeitar pedido de verificação</div>
      <button class="modal-close" onclick="closeAdminRejectModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-field">
        <label class="field-label">Motivo da rejeição (visível ao nutricionista)</label>
        <textarea class="field-textarea field-textarea-lg" id="admin-reject-reason" placeholder="Ex: o documento de identificação está ilegível, reenvie por favor."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-back" onclick="closeAdminRejectModal()">Cancelar</button>
      <button class="btn-primary" id="admin-reject-confirm-btn" onclick="confirmAdminReject()">Rejeitar pedido</button>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div id="confirmModal" class="modal-overlay" onclick="if(event.target===this)closeConfirm()" style="display:none">
  <div class="confirm-box">
    <button class="modal-close confirm-close" onclick="closeConfirm()">&times;</button>
    <div class="confirm-icon-wrap">
      <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
    </div>
    <div class="confirm-title" id="confirm-title">Confirmar ação</div>
    <p class="confirm-message" id="confirm-message"></p>
    <div class="confirm-actions">
      <button class="confirm-btn-cancel" onclick="closeConfirm()">Cancelar</button>
      <button class="confirm-btn-ok" id="confirm-ok-btn" onclick="confirmOk()">Continuar</button>
    </div>
  </div>
</div>

<!-- ALERT MODAL -->
<div id="alertModal" class="modal-overlay" onclick="if(event.target===this)closeAlertModal()" style="display:none">
  <div class="alert-box">
    <button class="modal-close alert-close" onclick="closeAlertModal()">&times;</button>
    <div class="alert-icon-wrap" id="alert-icon-wrap">
      <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="13"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </div>
    <div class="alert-title" id="alert-title">Ocorreu um erro</div>
    <p class="alert-message" id="alert-message"></p>
    <button class="alert-btn-ok" onclick="closeAlertModal()">Ok</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<button id="theme-toggle-btn" class="theme-toggle-btn" type="button" aria-label="Alternar tema claro/escuro" aria-pressed="false">
  <svg class="theme-toggle-icon theme-toggle-icon--sun" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
  <svg class="theme-toggle-icon theme-toggle-icon--moon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
</button>

<script src="js/supabase-client.js"></script>
<script src="js/shared.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
